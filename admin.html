<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Subir Productos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl p-8">
        <h2 class="text-2xl font-bold text-slate-800 mb-6 border-b pb-4">Añadir Nuevo Producto</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nombre del Producto</label>
                <input type="text" id="nombre" placeholder="Ej: Teclado Mecánico TKL" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Precio (Solo números)</label>
                <input type="number" id="precio" placeholder="Ej: 45000" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Descripción / Características</label>
                <textarea id="desc" rows="4" placeholder="Una característica por línea" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Imágenes</label>
                <input type="file" id="fotos" multiple accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 mt-2">
            </div>

            <button onclick="subirProducto()" id="btnGuardar" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all shadow-lg text-lg">
                PUBLICAR PRODUCTO
            </button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://vobezwjwvnnecqutilll.supabase.co';
        const SB_KEY = 'sb_publishable_wpdyTc9jzNC3fguoroXDKg_QtDCnSOv';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function subirProducto() {
            const btn = document.getElementById('btnGuardar');
            const nombre = document.getElementById('nombre').value;
            const precio = document.getElementById('precio').value;
            const desc = document.getElementById('desc').value;
            const fileInput = document.getElementById('fotos');

            if (!nombre || !precio || fileInput.files.length === 0) {
                alert("Por favor completa nombre, precio y sube al menos una imagen.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "SUBIENDO IMÁGENES...";

            let urlsCargadas = [];

            try {
                for (let file of fileInput.files) {
                    const ext = file.name.split('.').pop();
                    const fileName = `${Date.now()}-${Math.random().toString(36).substr(2, 9)}.${ext}`;

                    const { data, error: storageError } = await _supabase.storage
                        .from('fotos')
                        .upload(fileName, file);

                    if (storageError) throw storageError;

                    if (data) {
                        const { data: publicData } = _supabase.storage.from('fotos').getPublicUrl(fileName);
                        urlsCargadas.push(publicData.publicUrl);
                    }
                }

                const { error: insertError } = await _supabase.from('productos').insert([{
                    nombre: nombre,
                    precio: parseInt(precio),
                    descripcion: desc,
                    imagenes: urlsCargadas
                }]);

                if (insertError) throw insertError;

                alert("¡Producto publicado con éxito!");
                location.reload();

            } catch (err) {
                console.error(err);
                alert("Error: " + (err.message || "Error desconocido de red"));
                btn.disabled = false;
                btn.innerText = "PUBLICAR PRODUCTO";
            }
        }
    </script>
</body>
</html>
