<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-gray-100 px-4 py-6 md:px-8 md:py-10 xl:px-10">
  <h1 class="text-4xl md:text-5xl font-black text-center text-slate-800 mb-10 md:mb-14 uppercase tracking-tight">
    Catálogo de venta 2026
  </h1>

  <div id="catalog" class="max-w-[1500px] mx-auto grid grid-cols-1 xl:grid-cols-2 gap-10 xl:gap-12"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SB_URL = 'https://vobezwjwvnnecqutilll.supabase.co';
    const SB_KEY = 'sb_publishable_wpdyTc9jzNC3fguoroXDKg_QtDCnSOv';

    const supabase = createClient(SB_URL, SB_KEY);
    const catalog = document.getElementById('catalog');

    function normalizarImagenes(imagenes) {
      if (Array.isArray(imagenes)) return imagenes;

      if (typeof imagenes === 'string') {
        try {
          const parsed = JSON.parse(imagenes);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return imagenes ? [imagenes] : [];
        }
      }

      return [];
    }

    function formatearPrecio(precio) {
      if (precio === null || precio === undefined) return 'Sin precio';
      const texto = String(precio).trim();
      return texto !== '' ? texto : 'Sin precio';
    }

    function renderProductos(data) {
      catalog.innerHTML = '';

      if (!data || data.length === 0) {
        catalog.innerHTML = `
          <div class="col-span-full text-center text-gray-500 bg-white rounded-3xl shadow p-10 text-lg">
            No hay productos para mostrar.
          </div>
        `;
        return;
      }

      data.forEach((p) => {
        const imgs = normalizarImagenes(p.imagenes);

        const card = document.createElement('div');
        card.className = 'bg-white rounded-[30px] shadow-xl overflow-hidden flex flex-col h-full';

        card.innerHTML = `
          <div class="relative group">
            <div id="slider-${p.id}" class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar h-[320px] sm:h-[380px] md:h-[460px] xl:h-[520px] scroll-smooth">
              ${
                imgs.length
                  ? imgs.map(url => `
                      <img
                        src="${url}"
                        alt="${p.nombre || 'Producto'}"
                        class="w-full h-full object-cover flex-shrink-0 snap-center"
                        loading="lazy"
                      >
                    `).join('')
                  : `
                    <div class="w-full h-full flex items-center justify-center text-gray-400 bg-gray-200 flex-shrink-0 text-xl">
                      Sin imagen
                    </div>
                  `
              }
            </div>

            ${
              imgs.length > 1
                ? `
                  <button onclick="move('${p.id}', -1)" class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/90 hover:bg-white w-14 h-14 md:w-16 md:h-16 text-2xl rounded-full shadow-lg transition">
                    ❮
                  </button>
                  <button onclick="move('${p.id}', 1)" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/90 hover:bg-white w-14 h-14 md:w-16 md:h-16 text-2xl rounded-full shadow-lg transition">
                    ❯
                  </button>
                `
                : ''
            }
          </div>

          <div class="p-8 md:p-10 text-center flex-grow flex flex-col">
            <h2 class="text-2xl md:text-3xl xl:text-[2.1rem] font-black text-slate-800 leading-tight">
              ${p.nombre ?? 'Sin nombre'}
            </h2>

            <p class="text-3xl md:text-4xl font-black text-blue-600 my-4">
              ${formatearPrecio(p.precio)}
            </p>

            <div class="text-base md:text-lg text-gray-500 border-t pt-6 space-y-2 leading-relaxed mt-auto">
              ${
                p.descripcion
                  ? String(p.descripcion)
                      .split('\n')
                      .filter(l => l.trim() !== '')
                      .map(l => `<p>${l}</p>`)
                      .join('')
                  : '<p>Sin descripción</p>'
              }
            </div>
          </div>
        `;

        catalog.appendChild(card);
      });
    }

    window.move = (id, dir) => {
      const s = document.getElementById(`slider-${id}`);
      if (!s) return;
      s.scrollBy({ left: dir * s.offsetWidth, behavior: 'smooth' });
    };

    async function cargar() {
      try {
        const { data, error } = await supabase
          .from('productos')
          .select('id, nombre, precio, descripcion, imagenes')
          .order('id', { ascending: true });

        if (error) {
          console.error('Error Supabase:', error);
          catalog.innerHTML = `
            <div class="col-span-full text-center text-gray-500 bg-white rounded-3xl shadow p-10 text-lg">
              No se pudo cargar el catálogo.
            </div>
          `;
          return;
        }

        renderProductos(data);
      } catch (e) {
        console.error('Fallo de red o conexión:', e);
        catalog.innerHTML = `
          <div class="col-span-full text-center text-gray-500 bg-white rounded-3xl shadow p-10 text-lg">
            No se pudo cargar el catálogo.
          </div>
        `;
      }
    }

    cargar();
  </script>
</body>
</html>
