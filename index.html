<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Ocultar barra de scroll en el carrusel */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-10">
    <h1 class="text-3xl font-black text-center text-slate-800 mb-10 uppercase tracking-tighter">Catálogo de venta 2026</h1>
    
    <div id="catalog" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
        <div class="col-span-full text-center py-20">
            <p class="text-gray-400 animate-pulse text-xl">Cargando catálogo...</p>
        </div>
    </div>

    <script>
        // Configuración de tu Supabase
        const SB_URL = 'https://vobezwjwvnncquutilll.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvYmV6d2p3dm5uZWNxdXRpbGxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMTc0MzksImV4cCI6MjA5MTc5MzQzOX0.2V0Yp3m8YmXW1_F_xY5fI_w9XQ6_E8xXzP0_Z8z_xY8';
        
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function cargarCatalogo() {
            const container = document.getElementById('catalog');
            
            try {
                // Consultamos la tabla 'productos'
                const { data, error } = await _supabase
                    .from('productos')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-20 border-2 border-dashed border-gray-300 rounded-2xl">
                            <p class="text-gray-500 text-xl font-bold uppercase">No hay productos disponibles actualmente</p>
                            <p class="text-gray-400 mt-2">Usa el panel de administrador para subir el primero.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = ''; // Limpiar mensaje de carga

                data.forEach(p => {
                    const imgs = p.imagenes || [];
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-2xl shadow-lg overflow-hidden flex flex-col h-full transition-transform hover:scale-[1.02]";
                    
                    card.innerHTML = `
                        <div class="relative group">
                            <div id="slider-${p.id}" class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar h-64 scroll-smooth bg-gray-200">
                                ${imgs.length > 0 
                                    ? imgs.map(url => `<img src="${url}" class="w-full h-full object-cover flex-shrink-0 snap-center" onerror="this.src='https://via.placeholder.com/400?text=Imagen+no+disponible'">`).join('')
                                    : `<div class="w-full h-full flex items-center justify-center text-gray-400 italic">Sin imágenes</div>`
                                }
                            </div>
                            
                            ${imgs.length > 1 ? `
                                <button onclick="move('${p.id}', -1)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-white/80 p-2 rounded-full shadow hover:bg-white transition-colors">❮</button>
                                <button onclick="move('${p.id}', 1)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-white/80 p-2 rounded-full shadow hover:bg-white transition-colors">❯</button>
                            ` : ''}
                        </div>

                        <div class="p-6 text-center flex-grow">
                            <h2 class="text-xl font-bold text-slate-800 capitalize">${p.nombre}</h2>
                            <p class="text-2xl font-black text-blue-600 my-2">$${Number(p.precio).toLocaleString('es-CL')}</p>
                            
                            <div class="text-sm text-gray-500 text-left border-t pt-4 mt-2 space-y-1 italic">
                                ${p.descripcion 
                                    ? p.descripcion.split('\n').map(l => `<p class="flex items-start"><span class="mr-2">•</span>${l}</p>`).join('') 
                                    : '<p class="text-center text-gray-300">Sin descripción adicional</p>'}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                console.error("Error detallado:", err);
                container.innerHTML = `
                    <div class="col-span-full bg-red-50 border border-red-200 text-red-700 p-6 rounded-xl text-center">
                        <p class="font-bold">Error al conectar con la base de datos</p>
                        <p class="text-sm mt-1">${err.message || "Verifica los permisos RLS en Supabase."}</p>
                    </div>`;
            }
        }

        // Función para mover el carrusel
        window.move = (id, dir) => {
            const slider = document.getElementById(`slider-${id}`);
            const width = slider.offsetWidth;
            slider.scrollBy({ left: dir * width, behavior: 'smooth' });
        };

        // Iniciar carga al abrir la página
        document.addEventListener('DOMContentLoaded', cargarCatalogo);
    </script>
</body>
</html>
