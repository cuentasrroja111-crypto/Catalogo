<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Subir Productos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl p-8">
        <h2 class="text-2xl font-bold text-slate-800 mb-6 border-b pb-4">Añadir Nuevo Producto</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nombre del Producto</label>
                <input
                    type="text"
                    id="nombre"
                    class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                    placeholder="Ej: Monitor gaming ROG Strix XG27AQMR"
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Precio (texto libre)</label>
                <input
                    type="text"
                    id="precio"
                    class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                    placeholder="Ej: $480.000 / 120 USD / Consultar"
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Descripción (Características por línea)</label>
                <textarea
                    id="desc"
                    rows="5"
                    class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                    placeholder="27 Pulgadas&#10;Resolución 4K&#10;IPS rápido"
                ></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Imágenes (Hasta 10)</label>
                <input
                    type="file"
                    id="fotos"
                    multiple
                    accept="image/*"
                    class="w-full mt-1 text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                >
            </div>

            <button
                onclick="subirProducto()"
                id="btnMain"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95"
            >
                PUBLICAR PRODUCTO
            </button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://vobezwjwvnnecqutilll.supabase.co';
        const SB_KEY = 'sb_publishable_wpdyTc9jzNC3fguoroXDKg_QtDCnSOv';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function subirProducto() {
            const btn = document.getElementById('btnMain');
            const fileInput = document.getElementById('fotos');
            const nombre = document.getElementById('nombre').value.trim();
            const precio = document.getElementById('precio').value.trim();
            const desc = document.getElementById('desc').value.trim();

            if (!nombre || !precio || fileInput.files.length === 0) {
                alert("Por favor completa nombre, precio y al menos una foto.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "SUBIENDO IMÁGENES...";

            let urlsCargadas = [];

            try {
                for (const file of fileInput.files) {
                    const extension = file.name.split('.').pop();
                    const nombreArchivo = `${Date.now()}-${Math.random().toString(36).slice(2)}.${extension}`;

                    const { error: uploadError } = await _supabase.storage
                        .from('fotos')
                        .upload(nombreArchivo, file);

                    if (uploadError) {
                        throw new Error(`Error subiendo imagen: ${uploadError.message}`);
                    }

                    const { data: publicData } = _supabase.storage
                        .from('fotos')
                        .getPublicUrl(nombreArchivo);

                    urlsCargadas.push(publicData.publicUrl);
                }

                const { error: insertError } = await _supabase
                    .from('productos')
                    .insert([{
                        nombre: nombre,
                        precio: precio,
                        descripcion: desc,
                        imagenes: urlsCargadas
                    }]);

                if (insertError) {
                    throw new Error(insertError.message);
                }

                alert("¡Producto publicado con éxito!");
                location.reload();

            } catch (err) {
                console.error(err);
                alert("Error al guardar: " + err.message);
                btn.disabled = false;
                btn.innerText = "PUBLICAR PRODUCTO";
            }
        }
    </script>
</body>
</html>
