<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-gray-100 p-4 md:p-10">
  <h1 class="text-3xl font-black text-center text-slate-800 mb-10 uppercase tracking-tighter">
    Catálogo de venta 2026
  </h1>

  <div id="errorBox" class="hidden max-w-5xl mx-auto mb-8 rounded-2xl border border-red-200 bg-red-50 p-6 text-center">
    <h2 class="text-xl font-bold text-red-700 mb-2">Error al conectar con la base de datos</h2>
    <p id="errorText" class="text-red-600"></p>
  </div>

  <div id="loading" class="text-center text-gray-500 mb-6">Cargando productos...</div>

  <div id="catalog" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SB_URL = 'https://vobezwjwvnnecqutilll.supabase.co';
    const SB_KEY = 'sb_publishable_wpdyTc9jzNC3fguoroXDKg_QtDCnSOv';

    const supabase = createClient(SB_URL, SB_KEY);

    const catalog = document.getElementById('catalog');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');
    const loading = document.getElementById('loading');

    function mostrarError(msg) {
      loading.classList.add('hidden');
      errorBox.classList.remove('hidden');
      errorText.textContent = msg;
      console.error(msg);
    }

    function normalizarImagenes(imagenes) {
      if (Array.isArray(imagenes)) return imagenes;

      if (typeof imagenes === 'string') {
        try {
          const parsed = JSON.parse(imagenes);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return imagenes ? [imagenes] : [];
        }
      }

      return [];
    }

    function renderProductos(data) {
      loading.classList.add('hidden');
      catalog.innerHTML = '';

      if (!data || data.length === 0) {
        catalog.innerHTML = `
          <div class="col-span-full text-center text-gray-500 bg-white rounded-2xl shadow p-8">
            No hay productos para mostrar.
          </div>
        `;
        return;
      }

      data.forEach((p) => {
        const imgs = normalizarImagenes(p.imagenes);

        const card = document.createElement('div');
        card.className = 'bg-white rounded-2xl shadow-lg overflow-hidden flex flex-col h-full';

        card.innerHTML = `
          <div class="relative group">
            <div id="slider-${p.id}" class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar h-64 scroll-smooth">
              ${
                imgs.length
                  ? imgs.map(url => `
                      <img
                        src="${url}"
                        alt="${p.nombre || 'Producto'}"
                        class="w-full h-full object-cover flex-shrink-0 snap-center"
                      >
                    `).join('')
                  : `<div class="w-full h-full flex items-center justify-center text-gray-400 bg-gray-200 flex-shrink-0">
                      Sin imagen
                    </div>`
              }
            </div>
            ${
              imgs.length > 1
                ? `
                  <button onclick="move('${p.id}', -1)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-white/70 p-2 rounded-full shadow">❮</button>
                  <button onclick="move('${p.id}', 1)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-white/70 p-2 rounded-full shadow">❯</button>
                `
                : ''
            }
          </div>

          <div class="p-6 text-center flex-grow">
            <h2 class="text-xl font-bold text-slate-800">${p.nombre ?? 'Sin nombre'}</h2>
            <p class="text-2xl font-black text-blue-600 my-2">
              $${Number(p.precio ?? 0).toLocaleString('es-CL')}
            </p>
            <div class="text-sm text-gray-500 text-left border-t pt-4 space-y-1">
              ${
                p.descripcion
                  ? String(p.descripcion)
                      .split('\n')
                      .map(l => `<p>• ${l}</p>`)
                      .join('')
                  : '<p>• Sin descripción</p>'
              }
            </div>
          </div>
        `;

        catalog.appendChild(card);
      });
    }

    window.move = (id, dir) => {
      const s = document.getElementById(`slider-${id}`);
      if (!s) return;
      s.scrollBy({ left: dir * s.offsetWidth, behavior: 'smooth' });
    };

    async function cargar() {
      try {
        const { data, error } = await supabase
          .from('productos')
          .select('id, nombre, precio, descripcion, imagenes');

        if (error) {
          mostrarError(`Supabase respondió con error: ${error.message}`);
          return;
        }

        renderProductos(data);
      } catch (e) {
        mostrarError(`Fallo de red o conexión: ${e.message}`);
      }
    }

    cargar();
  </script>
</body>
</html>
