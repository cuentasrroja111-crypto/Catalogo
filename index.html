<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-10">
    <h1 class="text-3xl font-black text-center text-slate-800 mb-10 uppercase tracking-tighter">Catálogo de venta 2026</h1>
    
    <div id="catalog" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
        </div>

    <script>
        const SB_URL = 'https://vobezwjwvnnecqutilll.supabase.co';
        const SB_KEY = 'sb_publishable_wpdyTc9jzNC3fguoroXDKg_QtDCnSOv';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function cargarCatalogo() {
            const { data, error } = await _supabase.from('productos').select('*').order('created_at', { ascending: false });
            
            if (error) {
                console.error("Error cargando productos:", error);
                return;
            }

            const container = document.getElementById('catalog');
            container.innerHTML = '';

            data.forEach(p => {
                const imgs = p.imagenes || [];
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-lg overflow-hidden flex flex-col h-full transition-transform hover:scale-[1.02]";
                
                card.innerHTML = `
                    <div class="relative group">
                        <div id="slider-${p.id}" class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar h-64 scroll-smooth">
                            ${imgs.map(url => `<img src="${url}" class="w-full h-full object-cover flex-shrink-0 snap-center">`).join('')}
                        </div>
                        ${imgs.length > 1 ? `
                            <button onclick="move('${p.id}', -1)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-white/80 p-2 rounded-full shadow hover:bg-white">❮</button>
                            <button onclick="move('${p.id}', 1)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-white/80 p-2 rounded-full shadow hover:bg-white">❯</button>
                        ` : ''}
                    </div>
                    <div class="p-6 text-center flex-grow">
                        <h2 class="text-xl font-bold text-slate-800 capitalize">${p.nombre}</h2>
                        <p class="text-2xl font-black text-blue-600 my-2">$${Number(p.precio).toLocaleString('es-CL')}</p>
                        <div class="text-sm text-gray-500 text-left border-t pt-4 space-y-1 italic">
                            ${p.descripcion ? p.descripcion.split('\n').map(l => `<p>• ${l}</p>`).join('') : '<p class="text-center">Sin descripción</p>'}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.move = (id, dir) => {
            const s = document.getElementById(`slider-${id}`);
            s.scrollBy({ left: dir * s.offsetWidth, behavior: 'smooth' });
        };

        cargarCatalogo();
    </script>
</body>
</html>
